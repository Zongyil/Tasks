<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
      font-family: "OPPO Sans 4.0", "Segoe UI Variable", "Segoe UI", -apple-system, BlinkMacSystemFont, "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
      font-feature-settings: "emoji";
    }

    /* ========== 标题栏 ========== */
    #title-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 44px;
      background: transparent;
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      padding: 0 0 0 16px;
      padding-right: 140px;
      z-index: 99999;
      pointer-events: none;
    }

    .title-left {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.3px;
      color: #1a1a1a;
      -webkit-app-region: no-drag;
      pointer-events: auto;
    }

    /* ========== 内容容器 ========== */
    #content-frame {
      position: absolute;
      top: 44px;
      left: 0;
      width: 100vw;
      height: calc(100vh - 44px);
      border: none;
      display: block;
      z-index: 1;
    }

    /* ========== 全局毛玻璃 Tooltip ========== */
    .alpha-tooltip {
      position: fixed;
      padding: 8px 14px;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(24px) saturate(200%);
      -webkit-backdrop-filter: blur(24px) saturate(200%);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12), inset 0 1px 2px rgba(255, 255, 255, 0.8);
      color: #0f172a;
      font-size: 13px;
      font-weight: 600;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 99999;
      max-width: 240px;
      white-space: nowrap;
      font-family: inherit;
    }
    .alpha-tooltip.visible { opacity: 1; }
  </style>
</head>
<body>

  <div id="title-bar">
    <div class="title-left"><span>Tasks</span></div>
  </div>

  <iframe id="content-frame" src="Home.html"></iframe>

  <div class="alpha-tooltip" id="alphaTooltip"></div>

  <script>
    // 提取 Tooltip 元素引用（避免重复查询）
    const tooltipEl = document.getElementById('alphaTooltip');
    let tooltipTimer = null;

    // 窗口控制（双击最大化）
    document.getElementById('title-bar').addEventListener('dblclick', (e) => {
      if (e.target.closest('.title-left') || e.target === document.getElementById('title-bar')) {
        window.electronAPI.maximize()
      }
    })

    const frame = document.getElementById('content-frame')
    frame.addEventListener('load', () => {
      // 通知主进程关闭 Splash
      if (window.electronAPI && window.electronAPI.splashReady) {
        window.electronAPI.splashReady()
      }

      try {
        const doc = frame.contentDocument || frame.contentWindow.document
        if (doc) {
          // 注入字体（若 iframe 内部未定义）, 避免重复添加
          if (!doc.head.querySelector('style[data-font="oppo"]')) {
            const fontStyle = doc.createElement('style')
            fontStyle.setAttribute('data-font', 'oppo')
            fontStyle.textContent = `
              @font-face {
                font-family: 'OPPO Sans 4.0';
                src: url('./fonts/OPPO Sans 4.0.ttf') format('truetype');
                font-weight: 1 999;
                font-style: normal;
              }
              * {
                font-family: 'OPPO Sans 4.0', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif !important;
                font-feature-settings: "emoji";
              }
            `
            doc.head.appendChild(fontStyle)
          }

          // ====== 自定义 Tooltip (在 iframe 内生效) ======
          // 在 mouseover 中移除原生 title, 存入 dataset；mouseout 时恢复
          doc.addEventListener('mouseover', (e) => {
            const target = e.target.closest('[title]')
            if (!target) {
              clearTimeout(tooltipTimer)
              tooltipEl.classList.remove('visible')
              return
            }
            const title = target.getAttribute('title')
            if (!title) return

            // 保存原始 title 并移除, 防止浏览器默认提示
            if (!target.dataset.originalTitle) {
              target.dataset.originalTitle = title
              target.removeAttribute('title')
            }

            clearTimeout(tooltipTimer)
            tooltipTimer = setTimeout(() => {
              const rect = target.getBoundingClientRect()
              const parentRect = doc.defaultView.frameElement.getBoundingClientRect()
              const left = parentRect.left + rect.left + rect.width / 2
              const top = parentRect.top + rect.top - 10
              tooltipEl.textContent = title
              tooltipEl.style.left = left + 'px'
              tooltipEl.style.top = top + 'px'
              tooltipEl.style.transform = 'translate(-50%, -100%)'
              tooltipEl.classList.add('visible')
            }, 400)
          })

          doc.addEventListener('mouseout', (e) => {
            const target = e.target.closest('[title]')
            // 恢复 title（如果之前被移除）
            if (target && target.dataset.originalTitle) {
              target.setAttribute('title', target.dataset.originalTitle)
              delete target.dataset.originalTitle
            }
            clearTimeout(tooltipTimer)
            tooltipEl.classList.remove('visible')
          })

          doc.addEventListener('beforeunload', () => {
            tooltipEl.classList.remove('visible')
            clearTimeout(tooltipTimer)
          })
        }
      } catch (_) { /* 跨域忽略 */ }
    })
  </script>
</body>
</html>
