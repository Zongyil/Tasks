// 1. 核心高度计算器 (支持 0 毫秒无缝衔接 macOS 阻尼动画)
function adjustTextareaHeight(el) {
    if (el.dataset.userResized === 'true') return;
    
    // 获取边框厚度用于补偿
    const borderSize = el.offsetHeight - el.clientHeight;
    
    // 记住当前的像素高度
    const currentHeight = el.style.height || window.getComputedStyle(el).height;

    // 暂时剥夺动画权限, 并设为 auto 逼出文字的真实物理高度
    el.style.transition = 'none';
    el.style.height = 'auto';
    
    // 计算终极目标高度
    let targetHeight = el.scrollHeight + borderSize;
    
    // 保底高度同步提升至 126px
    if (targetHeight < 126) targetHeight = 126;

    // 瞬间恢复原高度, 并强迫浏览器执行“重新排版 (Reflow)”
    el.style.height = currentHeight;
    void el.offsetHeight; 

    // 重新开启丝滑过渡, 并推向新高度
    el.style.transition = '';
    el.style.height = targetHeight + 'px';
}

// ================= 6. Flatpickr 时间选择器 (Wrap 对齐) =================
function forceTimeFormat(instance, val) {
    if (!val) return false;
    let raw = val.replace(/\D/g, "");
    if (raw.length < 3) return false;
    let h = null, m = null;
    if (raw.length === 3) { h = raw.slice(0, 1); m = raw.slice(1, 3); } 
    else if (raw.length >= 4) { h = raw.slice(0, 2); m = raw.slice(2, 4); }
    if (h !== null && m !== null) {
        let hi = parseInt(h, 10), mi = parseInt(m, 10);
        if (hi <= 23 && mi <= 59) {
            let formatted = `${String(hi).padStart(2, "0")}:${String(mi).padStart(2, "0")}`;
            instance.input.value = formatted;
            instance.setDate(formatted, true);
            return true;
        }
    }
    return false;
}

const timeConfig = { 
    wrap: true, clickOpens: false, position: "auto left", enableTime: true, 
    noCalendar: true, dateFormat: "H:i", time_24hr: true, disableMobile: true, allowInput: true, minuteIncrement: 1,
    onReady: function(selectedDates, dateStr, instance) {
        
        // 1. 终极防击穿事件拦截器
        const flatpickrEnterHook = function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                e.stopImmediatePropagation(); // 彻底阻断 Flatpickr 内部干预
                
                // 💡 核心修复: 只有在键盘真正【按下】(keydown) 阶段才执行跳转, 彻底没收【弹起】(keyup) 阶段的穿透残影
                if (e.type === 'keydown') {
                    if (e.target.value) {
                        forceTimeFormat(instance, e.target.value);
                    }
                    instance.close();
                    
                    // 丝滑转移焦点至下一个控件
                    setTimeout(() => focusNextElement(e.target.id), 60);
                }
            } else if (e.key !== 'Tab') {
                // 依然保持对 "1222 -> 12:02" 篡改 bug 的绝对封杀
                e.stopImmediatePropagation();
            }
        };

        // 确保在事件捕获阶段优先拿到绝对控制权
        ['input', 'keyup', 'keydown'].forEach(evt => {
            instance.input.addEventListener(evt, flatpickrEnterHook, true);
        });

        instance.input.addEventListener('blur', function(e) { 
            forceTimeFormat(instance, this.value); 
        }, true);
    }
};

// ================= 7. 液态玻璃悬浮球拖拽逻辑 =================
window.addEventListener('DOMContentLoaded', () => {
    const sphere = document.getElementById('glassSphere');
    const modal = document.getElementById('sphereModal');
    if (!sphere || !modal) return;

    let sphereStartX, sphereStartY, initialLeft, initialTop;
    let isSphereDragging = false;

    sphere.addEventListener('pointerdown', (e) => {
        isSphereDragging = false;
        sphereStartX = e.clientX;
        sphereStartY = e.clientY;
        
        const rect = sphere.getBoundingClientRect();
        initialLeft = rect.left;
        initialTop = rect.top;
        
        sphere.setPointerCapture(e.pointerId);
        
        const onSphereMove = (moveEvent) => {
            const deltaX = moveEvent.clientX - sphereStartX;
            const deltaY = moveEvent.clientY - sphereStartY;
            
            if (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5) {
                isSphereDragging = true;
                sphere.style.right = 'auto'; 
                sphere.style.bottom = 'auto';
                
                let newLeft = Math.max(0, Math.min(initialLeft + deltaX, window.innerWidth - 64));
                let newTop = Math.max(0, Math.min(initialTop + deltaY, window.innerHeight - 64));
                
                sphere.style.left = newLeft + 'px';
                sphere.style.top = newTop + 'px';
            }
        };
        
        const onSphereUp = (upEvent) => {
            sphere.removeEventListener('pointermove', onSphereMove);
            sphere.removeEventListener('pointerup', onSphereUp);
            sphere.releasePointerCapture(e.pointerId);
            
            if (!isSphereDragging) {
                modal.classList.remove('hidden');
            }
        };
        
        sphere.addEventListener('pointermove', onSphereMove);
        sphere.addEventListener('pointerup', onSphereUp);
    });
});

// ================= 鼠标滚轮调节时间 =================
document.addEventListener('wheel', function(e) {
    if (e.target.classList.contains('flatpickr-hour') || e.target.classList.contains('flatpickr-minute')) {
        e.preventDefault();
        
        // 修复：向下滚(deltaY > 0)增加时间(变晚)；向上滚(deltaY < 0)减少时间(变早)
        const step = e.deltaY > 0 ? 1 : -1; 
        
        let max = e.target.classList.contains('flatpickr-hour') ? 23 : 59;
        let val = parseInt(e.target.value, 10);
        if (isNaN(val)) val = 0;
        
        val += step;
        if (val > max) val = 0;
        if (val < 0) val = max;
        
        e.target.value = String(val).padStart(2, '0');
        e.target.dispatchEvent(new Event('input', { bubbles: true })); 
    }
}, { passive: false });

    window.getTaskDeadline = function(taskId) {
        const mapping = JSON.parse(localStorage.getItem('alpha_task_mapping') || '{}');
        const listIds = mapping[taskId] || ['default'];
        
        for (let listId of listIds) {
            const list = lists.find(l => l.id === listId);

    function normalizeSmartDate(rawVal) {
        let s = rawVal.trim().replace(/[\.\s\/]/g, '-');
        if (!s || s === "无截止日期") return "无截止日期";
        if (/^\d+$/.test(s)) {
            if (s.length === 8) return `${s.substring(0,4)}-${s.substring(4,6)}-${s.substring(6,8)}`;
            if (s.length === 7) return `${s.substring(0,4)}-${s.substring(4,5).padStart(2,'0')}-${s.substring(5,7).padStart(2,'0')}`;
            if (s.length === 6) return `${s.substring(0,4)}-${s.substring(4,5).padStart(2,'0')}-${s.substring(5,6).padStart(2,'0')}`;
        }
        let parts = s.split('-');
        if (parts.length === 3 && parts[0].length === 4) {
            return `${parts[0]}-${String(parseInt(parts[1],10)||1).padStart(2,'0')}-${String(parseInt(parts[2],10)||1).padStart(2,'0')}`;
        }
        return s;
    }

    // 新增严密的日期合法性判定函数
    function isValidDate(dateString) {
        if (!dateString || dateString === "无截止日期") return true;
        const parts = dateString.split('-');
        if (parts.length !== 3) return false;
        const y = parseInt(parts[0], 10), m = parseInt(parts[1], 10), d = parseInt(parts[2], 10);
        if (y < 2000 || y > 2100 || m < 1 || m > 12) return false;
        const daysInMonth = [31, ((y % 4 === 0 && y % 100 !== 0) || y % 400 === 0) ? 29 : 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
        return d > 0 && d <= daysInMonth[m - 1];
    }

            if (rawCards.length === 0) return;

(function() {
    const resizer = document.getElementById('glassResizer');
    const layout = document.querySelector('.app');
    if (!resizer || !layout) return;

    resizer.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        resizer.setPointerCapture(e.pointerId);
        resizer.classList.add('dragging');
        
        // 挂载类: 瞬间释放重绘管线压力, 杜绝掉帧
        layout.classList.add('resizing-active');

        const startX = e.clientX;
        const sidebar = document.querySelector('.sidebar');
        const startLeftWidth = sidebar.offsetWidth;

        // 获取整体容器最大物理宽度
        const maxLayoutWidth = layout.offsetWidth;

        const onPointerMove = (moveEvent) => {
            const deltaX = moveEvent.clientX - startX;
            let newLeftWidth = startLeftWidth + deltaX;

            // 专属防碎边界限制: 左侧侧边栏最窄 290px, 最宽不超过容器整体的 45%
            if (newLeftWidth < 290) newLeftWidth = 290;
            if (newLeftWidth > (maxLayoutWidth * 0.45)) newLeftWidth = maxLayoutWidth * 0.45;

            // 顺应刷新率将改变写入 CSS 变量
            requestAnimationFrame(() => {
                layout.style.setProperty('--left-width', `${newLeftWidth}px`);
            });
        };

        const onPointerUp = (upEvent) => {
            resizer.removeEventListener('pointermove', onPointerMove);
            resizer.removeEventListener('pointerup', onPointerUp);
            resizer.releasePointerCapture(e.pointerId);
            
            resizer.classList.remove('dragging');
            layout.classList.remove('resizing-active'); // 拖拽完毕, 瞬间恢复极致画质
        };

        resizer.addEventListener('pointermove', onPointerMove);
        resizer.addEventListener('pointerup', onPointerUp);
    });
})();

(function() {
    // 核心修复 2: 将物理指纹挂载到 window 全局, 允许内部 saveSchedules 函数安全覆写
    window.__alphaLastTaskHubSign = localStorage.getItem('taskhub_data');

    function alphaAutoSyncEngine() {
        const currentSign = localStorage.getItem('taskhub_data');
        
        // 核心设计: 比对物理指纹, 只有当【其他页面】改变数据时, 才执行内存重洗与DOM重绘
        if (currentSign !== window.__alphaLastTaskHubSign) {
            window.__alphaLastTaskHubSign = currentSign; 
            
            try {
                // 1. 强行重洗内存中的全局 schedules 数组
                let parsed = JSON.parse(currentSign || '[]');
                if (Array.isArray(parsed)) {
                    schedules = parsed.filter(t => t && t.id && Array.isArray(t.subject));
                }
                
                // 2. 跨空喊话: 命令任务墙与你的 MutationObserver 表单分组引擎联合重绘
                if (typeof renderSchedules === 'function') {
                    renderSchedules();
                }
            } catch (err) {
                console.error("Project ALPHA 跨标签心跳掉帧, 已自动拦截安全降级", err);
            }
        }
    }

    // 轨道 1: 同源广播监听
    window.addEventListener('storage', (e) => {
        if (e.key === 'taskhub_data') alphaAutoSyncEngine();
    });

    // 轨道 2: 视窗焦点唤醒
    window.addEventListener('focus', alphaAutoSyncEngine);
    
    // 轨道 3: 高性能心跳校验 (兜底本地 file:// 协议不广播的死角) 
    setInterval(alphaAutoSyncEngine, 800);
})();

let alphaMenuTimeout; // 全局定时器拦截连触

function toggleAlphaMenu(e) {
    e.stopPropagation();
    const menu = document.getElementById('alphaDropdownMenu');
    const trigger = document.getElementById('logoTrigger');
    
    // 如果还没创建捕获层, 则动态插入一个 (保留这个层仅作视觉模糊的载体)
    if (!document.getElementById('navClickCatcher')) {
        const catcher = document.createElement('div');
        catcher.id = 'navClickCatcher';
        catcher.className = 'nav-click-catcher';
        document.body.appendChild(catcher);
    }
    
    if (menu.classList.contains('hidden')) {
        clearTimeout(alphaMenuTimeout); 
        menu.classList.remove('hidden');
        if (trigger) trigger.classList.add('active');
        
        // 确保清除残留的关闭状态, 瞬间挂载开启状态
        document.body.classList.remove('alpha-menu-closing');
        document.body.classList.add('alpha-menu-open'); 
        
        // ✅ 核心修复: 延迟开启全局点击监听, 捕获所有漏网之鱼
        setTimeout(() => {
            document.addEventListener('click', handleAlphaMenuOutsideClick);
        }, 0);
    } else {
        closeAlphaMenu();
    }
}

// ✅ 新增: 全局点击智能判定引擎
function handleAlphaMenuOutsideClick(e) {
    const menu = document.getElementById('alphaDropdownMenu');
    const trigger = document.getElementById('logoTrigger');
    
    // 1. 如果点击的是触发器本身, 防范冗余触发 (由 toggleAlphaMenu 统一接管) 
    if (trigger && trigger.contains(e.target)) return;
    
    // 2. 如果点击区域在下拉菜单内部
    if (menu && menu.contains(e.target)) {
        // 如果精准点击了具体的菜单项 (如当前 active 项) , 则执行关闭
        // 如果只是点到了菜单里的纯白缝隙, 则维持打开状态 (严格遵循 macOS 原生菜单行为) 
        if (e.target.closest('.dropdown-item')) {
            closeAlphaMenu();
        }
        return;
    }
    
    // 3. 点击菜单外部的任何区域 (包含 sidebar 空白、右侧大面积虚化区等) , 统统关闭
    closeAlphaMenu();
}

function closeAlphaMenu() {
    const menu = document.getElementById('alphaDropdownMenu');
    const trigger = document.getElementById('logoTrigger');
    
    if (menu && !menu.classList.contains('hidden')) {
        menu.classList.add('hidden');
        if (trigger) trigger.classList.remove('active');
        
        document.body.classList.remove('alpha-menu-open'); 
        document.body.classList.add('alpha-menu-closing'); 
        
        // ✅ 核心修复: 退场时立刻卸载全局监听, 保证性能绝不侧漏
        document.removeEventListener('click', handleAlphaMenuOutsideClick);
        
        clearTimeout(alphaMenuTimeout);
        alphaMenuTimeout = setTimeout(() => {
            // 300ms 后, 下拉框动画彻底退场, 撤掉保护伞, 完美落地
            document.body.classList.remove('alpha-menu-closing'); 
        }, 300);
    }
}

// 核心高度计算重绘器
function adjustTextareaHeight(el) {
    if (el.dataset.userResized === 'true') return;
    
    // 精准补偿 border-box 的边框厚度
    const borderSize = el.offsetHeight - el.clientHeight;
    const currentHeight = el.style.height || window.getComputedStyle(el).height;

    // 欺骗重排: 临时取消动画, 归零逼出真实内容高度
    el.style.transition = 'none';
    el.style.height = 'auto';
    
    let targetHeight = el.scrollHeight + borderSize;
    if (targetHeight < 126) targetHeight = 126; // 咬死 126px 黄金底线

    // 强迫浏览器 Reflow 重新排版
    el.style.height = currentHeight;
    void el.offsetHeight; 

    // 恢复阻尼动画, 推向理想高度
    el.style.transition = '';
    el.style.height = targetHeight + 'px';
}

// 关键补丁: 注入全局事件委托雷达, 让任何 textarea 都能实时响应打字
document.addEventListener('input', (e) => {
    if (e.target.tagName === 'TEXTAREA') {
        adjustTextareaHeight(e.target);
    }
});

// ================= 全局页面切换动效拦截引擎 V2 =================
window.addEventListener('DOMContentLoaded', () => {
    const appContainer = document.querySelector('.app');
    
    // 核心修复 2：进场动画播放完毕后，立刻卸载动画属性
    if (appContainer) {
        appContainer.addEventListener('animationend', (e) => {
            if (e.animationName === 'alphaPageIn') {
                // 瞬间摧毁残留的 animation 属性
                // 这将解除强制生成的“层叠上下文”，让 .app 内部和外部的 fixed 定位、z-index 以及 Blur 遮罩完美恢复原状！
                appContainer.style.animation = 'none';
            }
        });
    }

    // 拦截全局下拉菜单中带有 href 且指向内部页面的 <a> 标签
    document.querySelectorAll('a[href^="./"]').forEach(link => {
        link.addEventListener('click', (e) => {
            const targetUrl = link.getAttribute('href');
            
            const currentPath = window.location.pathname.split('/').pop() || 'index.html';
            const targetPath = targetUrl.replace('./', '');
            if (currentPath === targetPath) return; 

            e.preventDefault();
            
            if (appContainer) {
                // 挂载退场动画
                appContainer.classList.add('page-transition-leave');
                
                // 等待 400ms 后物理跳转
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 400);
            } else {
                window.location.href = targetUrl;
            }
        });
    });
});

    tooltipNode.id = 'alphaTooltip';
    document.body.appendChild(tooltipNode);

    // 2. 利用事件委托，监听全局的鼠标悬停（支持 JS 动态生成的元素）
    document.addEventListener('mouseover', (e) => {
        // 寻找当前鼠标下带有 title 或 data-tooltip 的最近元素
        const target = e.target.closest('[title], [data-tooltip]');
        if (!target) return;

        // 核心：瞬间没收原生 title，防止浏览器自带的生硬黑框弹出来
        if (target.hasAttribute('title')) {
            target.setAttribute('data-tooltip', target.getAttribute('title'));
            target.removeAttribute('title'); 
        }

        const tipText = target.getAttribute('data-tooltip');
        if (tipText) {
            tooltipNode.textContent = tipText;
            tooltipNode.classList.add('visible');
            updateTooltipPosition(e); // 立刻计算一次位置，防止动画乱飞
        }
    });

    // 3. 鼠标移动时，玻璃板柔性跟随
    document.addEventListener('mousemove', (e) => {
        if (tooltipNode.classList.contains('visible')) {
            updateTooltipPosition(e);
        }
    });

    // 4. 离开时褪去
    document.addEventListener('mouseout', (e) => {
        const target = e.target.closest('[data-tooltip]');
        if (target) {
            tooltipNode.classList.remove('visible');
        }
    });

    // 5. 点击时主动隐藏（防遮挡视线优化）
    document.addEventListener('mousedown', () => {
        tooltipNode.classList.remove('visible');
    });

    // 💡 定位计算函数（附带屏幕边缘防溢出系统）
    function updateTooltipPosition(e) {
        const offsetX = 14; // 距离鼠标的横向距离
        const offsetY = 18; // 距离鼠标的纵向距离
        
        let x = e.clientX + offsetX;
        let y = e.clientY + offsetY;

        // 右侧边界碰撞检测：如果超出版面，就翻转到鼠标左侧
        if (x + tooltipNode.offsetWidth > window.innerWidth) {
            x = e.clientX - tooltipNode.offsetWidth - 8;
        }
        
        // 底部边界碰撞检测：如果超出底部，就翻转到鼠标上方
        if (y + tooltipNode.offsetHeight > window.innerHeight) {
            y = e.clientY - tooltipNode.offsetHeight - 8;
        }

        tooltipNode.style.left = `${x}px`;
        tooltipNode.style.top = `${y}px`;
    }
});
</script>
