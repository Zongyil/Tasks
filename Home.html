<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>主页 | Tasks</title>
<link rel="icon" href="Home.ico" type="image/x-icon">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<base href="./">
<style>
/* ================== 全局与动态色彩体系 ================== */
:root {
    /* 默认主题色 (可通过壁纸取色动态修改) */
    --theme-hue: 210;
    --theme-sat: 20%;
    --theme-light: 85%;
    
    --text: #0f172a; 
    --sub: #64748b;
    
    /* 根据主题色生成的动态 Liquid Glass 颜色 */
    --dyn-bg: hsl(var(--theme-hue), var(--theme-sat), 96%);
    --dyn-panel: hsla(var(--theme-hue), var(--theme-sat), 98%, 0.45);
    --dyn-panel-border: hsla(var(--theme-hue), var(--theme-sat), 100%, 0.6);
    --dyn-primary: linear-gradient(135deg, hsla(var(--theme-hue), 50%, 85%, 0.85), hsla(var(--theme-hue), 60%, 88%, 0.85));
    --dyn-primary-hover: linear-gradient(135deg, hsla(var(--theme-hue), 50%, 90%, 0.95), hsla(var(--theme-hue), 60%, 93%, 0.95));
    --dyn-shadow: hsla(var(--theme-hue), 25%, 55%, 0.12);

    --glass: var(--dyn-panel);
    --glass-border: var(--dyn-panel-border);

    --shadow-xl: 0 40px 80px rgba(15,23,42,.08);
    --shadow-sm: 0 8px 20px rgba(15,23,42,.04);

    --spacing-main: 32px;   /* Panel 级内边距 */
    --spacing-card: 24px;   /* Card 级内边距 */
    --spacing-inside: 16px; /* 元素级内边距 */
    
    /* 4 级同心圆角体系 (Concentric Radius System) */
    --radius-panel: 32px;   /* L1: 主面板、侧边栏、全局弹窗 (原 main) */
    --radius-card: 24px;    /* L2: 任务卡片、图表容器、侧边小卡 */
    --radius-element: 16px; /* L3: 按钮、输入框、视图切换器 (独立出来) */
    --radius-sm: 10px;      /* L4: 内部小标签、日历箭头、下拉项 */

    --ease: cubic-bezier(0.22, 1, 0.36, 1);
}

* {
    margin: 0; padding: 0; box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    outline: none !important; -webkit-tap-highlight-color: transparent;
}

html { scroll-behavior: smooth; overflow-y: auto; overflow-x: hidden; }

::-webkit-scrollbar { width: 0; height: 0; background: transparent; }
/* 🎯 自适应的选中文字颜色 */
::selection { background-color: hsla(var(--theme-hue), 60%, 80%, 0.6); color: #0f172a; }
::-moz-selection { background-color: hsla(var(--theme-hue), 60%, 80%, 0.6); color: #0f172a; }

body {
    min-height: 100vh; color: var(--text);
    background: var(--dyn-bg);
    transition: background 1s ease;
    display: flex; flex-direction: column;
    scrollbar-width: none; -ms-overflow-style: none;
}

body > *:not(script):not(style):not(link):not(.sphere-modal):not(.flatpickr-calendar):not(#alphaTooltip) {
    animation: alphaPageIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

@keyframes alphaPageIn {
    0% {
        opacity: 0;
        /* 关键修改: 改成负值 (-120px), 让界面从屏幕顶部优雅降落下来 */
        transform: translateY(-120px) scale(0.96); 
    }
    100% {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

/* ================== 上半部分: 动态壁纸区 ================== */
.hero-wallpaper {
    position: relative; width: 100%; height: 45vh; min-height: 300px;
    background-color: #e2e8f0; background-size: cover; background-position: center;
    box-shadow: inset 0 -40px 100px -20px var(--dyn-bg);
    transition: box-shadow 1s ease, background-image 0.5s ease;
    display: flex; align-items: flex-end; justify-content: flex-end;
    /* 🎯 增加底部内边距, 防重叠 */
    padding: 40px 40px 80px 40px; 
}
.hero-wallpaper::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 40%, var(--dyn-bg) 100%);
    pointer-events: none;
}
.pip-btn {
    position: relative; z-index: 10;
    height: 44px; padding: 0 20px; border-radius:  var(--radius-element);
    background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(16px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 4px 12px rgba(15,23,42,0.05);
    color: #0f172a; font-weight: 700; cursor: pointer; transition: all 0.26s var(--ease);
}
.pip-btn:hover { background: rgba(255, 255, 255, 0.85); transform: translateY(-2px); border-color: #fff; }

/* ================== 下半部分: 功能区 ================== */
.home-layout {
    display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-main);
    width: 100%; max-width: 1600px; margin: -60px auto 40px auto; padding: 0 40px;
    position: relative; z-index: 10;
}
@media(max-width: 1000px) { .home-layout { grid-template-columns: 1fr; } }

.panel {
    /* 采用更具液态光泽的渐变半透明, 代替单一的纯色 */
    background: linear-gradient(135deg, hsla(var(--theme-hue), var(--theme-sat), 100%, 0.55) 0%, hsla(var(--theme-hue), var(--theme-sat), 96%, 0.3) 100%);
    border: 1px solid var(--glass-border);
    
    backdrop-filter: blur(48px) saturate(200%); 
    -webkit-backdrop-filter: blur(48px) saturate(200%);
    
    /* 移除了不存在的 var(--shadow-lg), 重新构建了多层高光内阴影与柔和外发光 */
    box-shadow: 0 24px 48px rgba(15, 23, 42, 0.06), 
                inset 0 2px 6px rgba(255, 255, 255, 0.6), 
                inset 0 1px 1px rgba(255, 255, 255, 0.9), 
                inset 1.5px 0 2px rgba(255, 255, 255, 0.3);
                
    border-radius: var(--radius-panel); 
    padding: 32px;
    transition: all 0.8s ease; will-change: backdrop-filter, transform;
    display: flex; 
    flex-direction: column; 
    gap: 20px;
}
.section-title { font-size: 24px; font-weight: 800; color: var(--text); display: flex; align-items: center; gap: 10px; }

.home-layout > .panel:first-child {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    height: 100%; /* 强迫左侧卡片物理高度与右侧 Grid 轨道保持绝对一致 */
}

/* ================== 文本框/输入框公共属性 ================== */
textarea, textarea#todoInput, input[type="text"] {
    width: 100%;
    border-radius: var(--radius-element);
    color: #0f172a; 
    font-size: 15px; 
    font-weight: 600; 
    line-height: 1.6;
    resize: none;
    transition: all 0.3s var(--ease);
}

/* ================== 隔离 精准控制两层描边 ================== */

/* 左侧“方法指南”文本框: 让它独自继承完美的2层白色光学描边, 作为动画过渡起点 */
textarea#todoInput {
    /* 剥除 flex-grow, 防止过度拉伸吃掉低于剩余空间的回弹动画 */
    flex: 0 0 auto; 
    /* 新增: 让下外边距自动吸收父级的剩余高度, 彻底解放文本框自身的物理高度限制 */
    margin-bottom: auto; 
    
    height: 200px; 

    transition: height 0.4s cubic-bezier(0.34, 1.45, 0.64, 1), box-shadow 0.3s ease, border-color 0.3s ease !important;

    padding: 16px 20px; 
    background: rgba(255, 255, 255, 0.6);
    overflow-y: hidden; 

    /* 彻底剥除 4px 的白色软包常驻外圈, 仅保留内阴影, 把双圈效果留给 focus 状态 */
    border: 1px solid rgba(255, 255, 255, 0.9) !important;
    box-shadow: 0 0 0 0 transparent, inset 0 2px 5px rgba(15, 23, 42, 0.05), inset 0 -1px 1.5px rgba(255, 255, 255, 0.65) !important;
}

/* 2 右侧“普通单行输入框”: 彻底删除多余的白色软包, 保持 Liquid Glass 干净隐形状态 */
input[type="text"] {
    height: 50px;
    padding: 0 20px;
    background: rgba(255, 255, 255, 0.5);

    /* 剥除白色软包, 隐形状态 */
    border: 1px solid transparent !important;
    box-shadow: 0 0 0 0 transparent, inset 0 2px 5px rgba(15, 23, 42, 0.05), inset 0 -1px 1.5px rgba(255, 255, 255, 0.65) !important;
}

input::placeholder, textarea::placeholder { color: #748091; font-weight: 500; }
input:hover, textarea:hover, textarea#todoInput:hover { background: rgba(255, 255, 255, 0.9); }
input:focus, textarea:focus {
    background: #ffffff; border-color: var(--monet-blue) !important;
    box-shadow: 0 0 0 4px rgba(157, 210, 255, 0.25), 0 12px 24px rgba(15, 23, 42, 0.08) !important;
}

/* 聚焦状态: 双圈随动变色系统 */
input:focus, textarea:focus, textarea#todoInput:focus { 
    background: #ffffff; 
    /* 聚焦第 1 圈: 变为主题色实线 */
    border-color: hsla(var(--theme-hue), 60%, 75%, 1) !important; 
    /* 聚焦第 2 圈: 变为同色系的半透明呼吸光晕, 并附带底部大阴影 */
    box-shadow: 
        0 0 0 4px hsla(var(--theme-hue), 60%, 75%, 0.25), 
        0 12px 24px var(--dyn-shadow) !important; 
}

/* ================== 按钮动效系统升级 ================== */
button, upload-label {
    position: relative; overflow: hidden; display: inline-flex; height: 52px; border: none;
    align-items: center; justify-content: center; padding: 0 24px;
    border-radius: var(--radius-element); cursor: pointer; font-size: 16px !important; font-weight: 700 !important; 
    /* 极致顺滑的过渡: 使用弹性阻尼曲线, 保留 transform 硬件加速 */
    transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), background 0.3s ease, box-shadow 0.3s ease; 
    outline: none; letter-spacing: 0.5px;
    will-change: transform, box-shadow; 
}

/* 废弃原先粗暴的 ::before 伪元素高光, 改用更优雅的多重 background */
button::before { display: none; }
button:active { transform: scale(0.96) !important; }

/* ------------------------------------------------
   1. Primary (同色边缘折射版 - 动态取色适配)
------------------------------------------------ */
.primary { 
    background: 
        radial-gradient(circle at 85% 15%, rgba(255, 250, 240, 0.35) 0%, transparent 60%),
        /* 将写死的莫奈蓝转译为基于 var(--theme-hue) 的高亮色调 */
        linear-gradient(135deg, hsla(var(--theme-hue), 71%, 88%, 0.75) 0%, hsla(var(--theme-hue), 80%, 72%, 0.45) 100%);
    color: #0f172a; 
    
    /* 彻底移除 border, 用 box-shadow 模拟边框以获得更完美的折射发光效果 */
    border: none;
    
    box-shadow: 
        0 6px 16px hsla(var(--theme-hue), 70%, 68%, 0.2), 
        inset 0 1.5px 2px rgba(255, 255, 255, 0.95), 
        inset -1px -1px 2px rgba(255, 255, 255, 0.3), 
        /* 💡 高透冰莹边缘: 映射为浅白底透出当前主题色 */
        0 0 0 1px hsla(var(--theme-hue), 92%, 97%, 0.85); 
        
    backdrop-filter: blur(16px) saturate(180%); 
    -webkit-backdrop-filter: blur(16px) saturate(180%);
}

.primary:hover { 
    background: 
        radial-gradient(circle at 85% 15%, rgba(255, 250, 240, 0.55) 0%, transparent 65%),
        linear-gradient(135deg, hsla(var(--theme-hue), 80%, 84%, 0.95) 0%, hsla(var(--theme-hue), 80%, 78%, 0.55) 100%);
    transform: translateY(-2px); 
    
    box-shadow: 
        0 12px 24px hsla(var(--theme-hue), 70%, 68%, 0.3), 
        inset 0 2px 3px rgba(255, 255, 255, 1), 
        inset -1px -1px 2px rgba(255, 255, 255, 0.5),
        /* 💡 悬浮时呈现带有一点点主题色调的高透霜白色 */
        0 0 0 1.5px hsla(var(--theme-hue), 90%, 96%, 0.9); 
}

.primary:active {
    background: 
        radial-gradient(circle at 85% 15%, rgba(255, 250, 240, 0.2) 0%, transparent 40%),
        /* 💡 自适应降维: 点击时渐变色稍稍加深, 模拟手指按压遮光效果 */
        linear-gradient(135deg, hsla(var(--theme-hue), 80%, 76%, 0.75) 0%, hsla(var(--theme-hue), 80%, 70%, 0.35) 100%);
    
    /* 🪄 极客级物理交互: 微量下沉回弹, 配合 0.98 的阻尼微缩, 立刻释放物理实体按压质感 */
    transform: translateY(0px) scale(0.98); 
    
    box-shadow: 
        0 2px 6px hsla(var(--theme-hue), 70%, 68%, 0.1), 
        inset 0 3px 6px rgba(15, 23, 42, 0.08), 
        inset 0 1px 1px rgba(255, 255, 255, 0.5),
        /* 💡 按下时高透边缘折射环跟随同步变暗, 完美贴合物理深陷阴影 */
        0 0 0 1px hsla(var(--theme-hue), 80%, 78%, 0.6);
}

/* ------------------------------------------------
   2. Secondary (清透玻璃) - 微调适配
------------------------------------------------ */
.secondary { 
    background: 
        radial-gradient(circle at 85% 15%, rgba(255, 252, 245, 0.5) 0%, transparent 50%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.5) 0%, rgba(240, 248, 255, 0.15) 100%); 
    color: var(--monet-text);
    box-shadow: 
        0 6px 16px rgba(15, 23, 42, 0.04), 
        inset 0 1.5px 2px rgba(255, 255, 255, 0.95), 
        inset -1px -1px 2px rgba(255, 255, 255, 0.3), 
        /* 💡 将死白改为带有淡淡冷灰/冷蓝的珍珠白, 消除锐利感 */
        0 0 0 1px rgba(241, 245, 249, 0.85);
    backdrop-filter: blur(16px) saturate(180%); 
    -webkit-backdrop-filter: blur(16px) saturate(180%);
}

.secondary:hover { 
    background: 
        radial-gradient(circle at 85% 15%, rgba(255, 252, 245, 0.7) 0%, transparent 60%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.8) 0%, rgba(245, 250, 255, 0.35) 100%); 
    transform: translateY(-2px);
    box-shadow: 
        0 10px 24px rgba(15, 23, 42, 0.08), 
        inset 0 2px 3px rgba(255, 255, 255, 1), 
        inset -1px -1px 2px rgba(255, 255, 255, 0.5), 
        0 0 0 1.5px rgba(255, 255, 255, 0.95); 
}

.secondary:active {
    background: 
        radial-gradient(circle at 85% 15%, rgba(255, 252, 245, 0.3) 0%, transparent 40%),
        linear-gradient(135deg, rgba(245, 250, 255, 0.4) 0%, rgba(230, 240, 255, 0.1) 100%);
    box-shadow: 
        0 2px 6px rgba(15, 23, 42, 0.03), 
        inset 0 3px 6px rgba(15, 23, 42, 0.04), 
        inset 0 1px 1px rgba(255, 255, 255, 0.6),
        0 0 0 1px rgba(226, 232, 240, 0.7);
}

/* ------------------------------------------------
   3. Danger (警示红) - 同色边缘折射版
------------------------------------------------ */
.danger { 
    background: 
        radial-gradient(circle at 85% 15%, rgba(255, 235, 230, 0.2) 0%, transparent 50%),
        linear-gradient(135deg, rgba(250, 66, 62, 0.75) 0%, rgba(220, 38, 38, 0.55) 100%); 
    color: #ffffff; 
    box-shadow: 
        0 6px 16px rgba(239, 68, 68, 0.2), 
        inset 0 1.5px 2px rgba(255, 255, 255, 0.5), 
        inset -1px -1px 2px rgba(0, 0, 0, 0.08),
        /* 💡 将白边改为高透珊瑚红: 红玻璃的边缘就应该是透亮的红色 */
        0 0 0 1px rgba(255, 199, 199, 0.75); 
    backdrop-filter: blur(16px) saturate(180%); 
    -webkit-backdrop-filter: blur(16px) saturate(180%);
}

.danger:hover { 
    background: 
        radial-gradient(circle at 85% 15%, rgba(255, 235, 230, 0.45) 0%, transparent 65%),
        linear-gradient(135deg, rgba(248, 113, 113, 0.95) 0%, rgba(239, 68, 68, 0.7) 100%); 
    transform: translateY(-2px); 
    box-shadow: 
        0 10px 24px rgba(239, 68, 68, 0.3), 
        inset 0 2px 3px rgba(255, 255, 255, 0.75), 
        inset -1px -1px 2px rgba(0, 0, 0, 0.12),
        /* 将刺眼的亮红边, 改为带有一丝微粉的珍珠白 */
        0 0 0 1.5px rgba(255, 240, 240, 0.9); 
}

.danger:active {
    background: 
        linear-gradient(135deg, rgba(220, 38, 38, 0.75) 0%, rgba(185, 28, 28, 0.45) 100%);
    box-shadow: 
        0 2px 6px rgba(239, 68, 68, 0.1), 
        inset 0 3px 6px rgba(0, 0, 0, 0.15), 
        inset 0 1px 1px rgba(255, 255, 255, 0.3),
        /* 💡 按下时压暗边缘红色 */
        0 0 0 1px rgba(220, 38, 38, 0.5);
}

/* ================== 账户设置 ==================== */
.alpha-avatar-hook {
    position: absolute;
    top: 40px; 
    left: 40px; /* 如果你想放在右上角, 可改为 right: 40px */
    width: 28px; 
    height: 28px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.35);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.7);
    box-shadow: 0 8px 24px rgba(15,23,42,0.08), inset 0 2px 4px rgba(255,255,255,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    /* 延长过渡时间配合阻尼曲线, 让动画更具韧性 */
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 1000;
    overflow: hidden;
}

/* 增加容器悬浮时的放大率与主题光晕 */
.alpha-avatar-hook:hover {
    transform: translateY(-6px) scale(1.2);
    box-shadow: 0 16px 32px rgba(15,23,42,0.15), 
                0 0 0 3px hsla(var(--theme-hue), 60%, 80%, 0.3), /* 融入当前动态壁纸的主题光晕 */
                inset 0 2px 4px rgba(255,255,255,0.9);
    background: rgba(255, 255, 255, 0.85);
}

/* 极客级物理交互按压反馈 */
.alpha-avatar-hook:active {
    transform: translateY(-2px) scale(0.95);
    box-shadow: 0 4px 12px rgba(15,23,42,0.1), inset 0 2px 4px rgba(255,255,255,0.4);
}

.alpha-avatar-hook .avatar-emoji {
    font-size: 24px;
    /* 赋予内部元素同频的过渡动画 */
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* 内部 Emoji 在容器悬浮时的微缩放与俏皮旋转 */
.alpha-avatar-hook:hover .avatar-emoji {
    transform: scale(1.15) rotate(5deg);
}

.alpha-avatar-hook img {
    width: 100%; height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0; left: 0;
    /* 赋予图片层独立的阻尼过渡 */
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* 头像图片在悬浮时的视差透视感 */
.alpha-avatar-hook:hover img {
    transform: scale(1.15) rotate(3deg);
}

/* ================== Flatpickr & Time 控件深度定制 ================== */
.time-wrap { display: flex; align-items: center; position: relative; width: 130px; flex-shrink: 0; }
.time-wrap input { padding-right: 44px; padding-left: 16px; }
.time-wrap .time-icon {
    position: absolute; right: 8px; font-size: 18px; cursor: pointer;
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    border-radius: var(--radius-sm); /* 柔和的圆角 */
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.time-wrap .time-icon:hover { 
    transform: scale(1.1); 
    background: rgba(15, 23, 42, 0.05); /* 半透明灰底, 透出玻璃质感 */
}
.time-wrap .time-icon:active { 
    transform: scale(0.95); 
    background: rgba(15, 23, 42, 0.08); 
}

.flatpickr-calendar {
    /* 彻底锁定绝对定位与顶级图层, 防止计算坐标时发生弹跳 (滚哪里去了) */
    position: absolute !important; 
    z-index: 99999 !important;
    display: block !important; 
    animation: none !important;

    margin-top: 12px !important; 

    opacity: 0 !important; 
    visibility: hidden !important;
    
    /* 开启 3D 硬件加速 (translateZ), 强制 GPU 单独渲染此图层, 防止隐形 (只见阴影) */
    transform: translateY(12px) scale(0.95) translateZ(0) !important;
    pointer-events: none !important;

    /* 移除容易导致图层崩溃的 will-change, 回归纯粹的阻尼过渡 */
    transition: opacity 0.3s cubic-bezier(0.22, 1, 0.36, 1), 
                transform 0.3s cubic-bezier(0.22, 1, 0.36, 1), 
                visibility 0s 0.3s !important;
}

.flatpickr-calendar.open, .flatpickr-calendar.inline {
    opacity: 1 !important; 
    visibility: visible !important;
    /* 同步加上 translateZ(0) 保护 */
    transform: translateY(0) scale(1) translateZ(0) !important;
    pointer-events: auto !important;

    transition: opacity 0.3s cubic-bezier(0.22, 1, 0.36, 1), 
                transform 0.3s cubic-bezier(0.22, 1, 0.36, 1), 
                visibility 0s 0s !important;
}

.flatpickr-calendar.noCalendar {
    width: max-content !important; 
    min-width: 160px !important;
    padding: 0 !important;
    
    background: rgba(255, 255, 255, 0.35) !important;

.alarm-list {

@keyframes alarmPopIn {

    60% { opacity: 1; transform: translateX(4px) scale(1.01); } /* 略微收敛放大比例, 避免过度溢出 */

<script>
// DOM 引用缓存 (减少重复查询) 
const DOM = {
    get dialog()         { return this._dialog      || (this._dialog      = document.getElementById('customDialog')); },
    get dialogIcon()     { return this._dialogIcon  || (this._dialogIcon  = document.getElementById('dialogIcon')); },
    get dialogTitle()    { return this._dialogTitle || (this._dialogTitle = document.getElementById('dialogTitle')); },
    get dialogMessage()  { return this._dialogMsg   || (this._dialogMsg   = document.getElementById('dialogMessage')); },
    get dialogCancelBtn(){ return this._dialogCancel || (this._dialogCancel= document.getElementById('dialogCancelBtn')); },
    get dialogConfirmBtn(){ return this._dialogConfirm||(this._dialogConfirm= document.getElementById('dialogConfirmBtn')); },
    get todoInput()      { return this._todoInput    || (this._todoInput   = document.getElementById('todoInput')); },
    get alarmList()      { return this._alarmList    || (this._alarmList   = document.getElementById('alarmList')); },
    get alarmTime()      { return this._alarmTime    || (this._alarmTime   = document.getElementById('alarmTime')); },
    get alarmName()      { return this._alarmName    || (this._alarmName   = document.getElementById('alarmName')); },
    get ringtoneBtn()    { return this._ringtoneBtn  || (this._ringtoneBtn = document.getElementById('ringtoneBtn')); },
    get ringtoneInput()  { return this._ringtoneInput|| (this._ringtoneInput= document.getElementById('ringtoneInput')); },
    get wpInput()        { return this._wpInput      || (this._wpInput     = document.getElementById('wpInput')); },
    get heroWallpaper()  { return this._heroWallpaper|| (this._heroWallpaper= document.getElementById('heroWallpaper')); },
    get userAvatarPreview(){ return this._userAvatar  || (this._userAvatar  = document.getElementById('userAvatarPreview')); },
    _dialog: null, _dialogIcon: null, _dialogTitle: null, _dialogMsg: null,
    _dialogCancel: null, _dialogConfirm: null, _todoInput: null, _alarmList: null,
    _alarmTime: null, _alarmName: null, _ringtoneBtn: null, _ringtoneInput: null,
    _wpInput: null, _heroWallpaper: null, _userAvatar: null
};

// ================== 全局弹窗引擎 ==================
window.dialogConfirmCallback = null;
function customAlert(msg, title = "提示", icon = "💡", onClose = null) {
    DOM.dialogIcon.textContent = icon;
    DOM.dialogTitle.textContent = title;
    DOM.dialogMessage.innerHTML = msg;
    DOM.dialogCancelBtn.style.display = 'none';
    const confirmBtn = DOM.dialogConfirmBtn;
    confirmBtn.textContent = "我知道了";
    window.dialogConfirmCallback = () => {
        DOM.dialog.classList.add('hidden');
        if (onClose) onClose(); 
    };
    DOM.dialog.classList.remove('hidden');
}

// ================== Material You 自动萃取引擎 ==================
const wpInput = DOM.wpInput;
const heroWallpaper = DOM.heroWallpaper;

const savedWp = localStorage.getItem('alpha_wallpaper');
if (savedWp) {
    heroWallpaper.style.backgroundImage = `url(${savedWp})`;
    extractColorFromBase64(savedWp);
} else {
    document.documentElement.style.setProperty('--theme-hue', '210');
}

wpInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        const dataUrl = ev.target.result;
        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 1920;
            let width = img.width, height = img.height;
            if (width > MAX_WIDTH) { height = Math.round(height * MAX_WIDTH / width); width = MAX_WIDTH; }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            const compressed = canvas.toDataURL('image/jpeg', 0.85);
            try {
                localStorage.setItem('alpha_wallpaper', compressed);
                heroWallpaper.style.backgroundImage = `url(${compressed})`;
                extractThemeColor(img);
            } catch(err) {
                customAlert("壁纸文件过大, 无法存入本地缓存, 请裁剪后重试", "壁纸保存失败", "⚠️");
            }
        };
        img.src = dataUrl;
    };
    reader.readAsDataURL(file);
});

function extractColorFromBase64(base64) {
    const img = new Image();
    img.onload = () => extractThemeColor(img);
    img.src = base64;
}

function extractThemeColor(img) {
    // 🎯 将像素级运算延迟到下一帧, 避免阻塞页面初始渲染
    requestAnimationFrame(() => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 100; canvas.height = 100;
        ctx.drawImage(img, 0, 0, 100, 100);
        const data = ctx.getImageData(0, 0, 100, 100).data;
        let r = 0, g = 0, b = 0, count = 0;
        for (let i = 0; i < data.length; i += 4) {
            if (data[i] > 240 && data[i+1] > 240 && data[i+2] > 240) continue;
            if (data[i] < 20 && data[i+1] < 20 && data[i+2] < 20) continue;
            r += data[i]; g += data[i+1]; b += data[i+2]; count++;
        }
        if (count === 0) return;
        r = Math.floor(r/count); g = Math.floor(g/count); b = Math.floor(b/count);

        r /= 255; g /= 255; b /= 255;
        const max = Math.max(r, g, b), min = Math.min(r, g, b);
        let h, s, l = (max + min) / 2;
        if (max === min) { h = s = 0; }
        else {
            const d = max - min;
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
            switch (max) {
                case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                case g: h = (b - r) / d + 2; break;
                case b: h = (r - g) / d + 4; break;
            }
            h /= 6;
        }
        document.documentElement.style.setProperty('--theme-hue', Math.round(h * 360));
    });
}

// ================= 强制时间格式化与焦点引擎 =================
function forceTimeFormat(instance, val) {
    if (!val || !instance) return false;
    let raw = val.replace(/\D/g, ""); 
    if (raw.length < 3) return false; 
    
    let h = null, m = null;
    if (raw.length === 3) { h = raw.slice(0, 1); m = raw.slice(1, 3); } 
    else if (raw.length >= 4) { h = raw.slice(0, 2); m = raw.slice(2, 4); }
    
    if (h !== null && m !== null) {
        let hi = parseInt(h, 10), mi = parseInt(m, 10);
        if (hi <= 23 && mi <= 59) {
            let formatted = `${String(hi).padStart(2, "0")}:${String(mi).padStart(2, "0")}`;
            
            // 比对状态锁
            // 拦截由于 input 失去焦点(blur)导致的无效重绘, 保护 CSS 退出动画不被打断
            if (instance.input.value !== formatted) {
                instance.input.value = formatted;
                instance.setDate(formatted, true);
            }
            return true;
        }
    }
    return false;
}

const alarmTimeInput = DOM.alarmTime;
const alarmNameInput = DOM.alarmName;

// 终极独立事件拦截器 (Capture Phase + Immediate Stop)
const flatpickrEnterHook = function(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        e.stopImmediatePropagation(); // 阻断同层级 Flatpickr 内部的回车监听器
        
        if (forceTimeFormat(fpInstance, e.target.value) || e.target.value) {
            fpInstance.close();
            // 延迟 60ms 将焦点安全转移给下一个输入框
            setTimeout(() => alarmNameInput.focus(), 60);
        }
    } else if (e.key !== 'Tab') {
        // 只要不是 Tab 键, 任何输入 (如 1222) 在到达 Flatpickr 前被直接就地拦截没收
        e.stopImmediatePropagation();
    }
};

const fpInstance = flatpickr("#alarmTimeWrap", {
    enableTime: true,
    noCalendar: true,
    dateFormat: "H:i",
    time_24hr: true,
    wrap: true,
    clickOpens: false, 
    allowInput: true,

// ================== Microsoft To Do 智能解析引擎 ==================
function getTargetDateStr(keyword) {
    const d = new Date();
    if (keyword === '明天') d.setDate(d.getDate() + 1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function parseToDo() {
    const text = DOM.todoInput.value.trim();
    if (!text) { customAlert("请先粘贴 To Do 列表文本!", "内容为空", "📋"); return; }

    let lines = text.split('\n').filter(l => l.trim() !== '');
    if (lines.length === 0) return;

    const listCategory = lines[0].trim();
    let isCompletedSection = false;
    let parentTaskName = "";
    
    let hubData = JSON.parse(localStorage.getItem('taskhub_data') || '[]');
    let flowData = JSON.parse(localStorage.getItem('taskflow_data') || '{}');
    let addedHub = 0, addedFlow = 0;

    for (let i = 1; i < lines.length; i++) {
        let line = lines[i];
        if (line.trim() === '已完成') { isCompletedSection = true; continue; }

        const isPending = line.includes('⬜');
        const isDone = line.includes('✅');
        
        if (!isPending && !isDone) continue; 
        
        const isSubtask = line.startsWith(' ') || line.startsWith('\t') || line.startsWith(' ');
        let taskName = line.replace(/⬜|✅/g, '').trim();
        let priority = 'Medium';
        let deadline = '无截止日期';

        if (taskName.includes('★')) { priority = 'High'; taskName = taskName.replace('★', '').trim(); }
        
        const dateMatch = taskName.match(/- 截止 (今天|明天)/);
        if (dateMatch) {
            deadline = getTargetDateStr(dateMatch[1]);
            taskName = taskName.replace(dateMatch[0], '').trim();
        }

        if (isSubtask && parentTaskName) { taskName = `${parentTaskName} - ${taskName}`; } 
        else { parentTaskName = taskName; }

        let taskObj = {
            id: window.crypto?.randomUUID?.() || String(Date.now() + i),
            name: taskName,
            subject: [listCategory],
            priority: priority,
            remark: "从 To Do 导入",
            start: "", end: "",
            isCompleted: isCompletedSection || isDone
        };

        if (taskObj.isCompleted) {
            const todayStr = getTargetDateStr('今天');
            if (!flowData[todayStr]) flowData[todayStr] = [];
            flowData[todayStr].push({
                id: taskObj.id, name: taskObj.name, category: taskObj.subject,
                duration: 25, date: todayStr, remark: taskObj.remark, createdAt: Date.now()
            });
            addedFlow++;
        } else {
            hubData.push(taskObj);
            addedHub++;
            let mapping = JSON.parse(localStorage.getItem('alpha_task_mapping') || '{}');
            mapping[taskObj.id] = ['default'];
            localStorage.setItem('alpha_task_mapping', JSON.stringify(mapping));
        }
    }

    localStorage.setItem('taskhub_data', JSON.stringify(hubData));
    localStorage.setItem('taskflow_data', JSON.stringify(flowData));
    
    DOM.todoInput.value = '';
    customAlert(`✅ 解析完成!<br><br>新增待办计划 (Hub): <b>${addedHub}</b> 项<br>新增已完结记录 (Flow): <b>${addedFlow}</b> 项`, "导入成功", "🎉");
}

DOM.todoInput.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        parseToDo();
    }
});

// ================== 日程闹钟引擎 ==================
let alarms = JSON.parse(localStorage.getItem('alpha_alarms') || '[]');

function renderAlarms() {
    const list = DOM.alarmList;
    list.innerHTML = '';
    alarms.sort((a, b) => a.time.localeCompare(b.time));
    alarms.forEach((al) => {
        list.innerHTML += `
            <div class="alarm-item" id="alarm-${al.id}">
                <div class="alarm-time">${al.time}</div>
                <div class="alarm-name">${al.name}</div>
                <div class="alarm-del" onclick="deleteAlarm('${al.id}')">✕</div>
            </div>`;
    });
}

function addAlarm() {
    // 传入正确的 fpInstance 对象, 而不是 DOM 节点
    forceTimeFormat(fpInstance, alarmTimeInput.value);
    
    const time = alarmTimeInput.value;
    const name = alarmNameInput.value.trim() || "日程提醒";
    if (!time) { customAlert("请先选择或输入闹钟时间!", "缺失时间", "⏰"); return; }
    
    alarms.push({ id: String(Date.now()), time, name, triggeredDay: '' });
    localStorage.setItem('alpha_alarms', JSON.stringify(alarms));
    alarmNameInput.value = '';
    
    // 添加成功后, 把焦点还给时间输入框, 方便连续添加
    fpInstance.clear();
    alarmTimeInput.focus();
    
    renderAlarms();
}

function deleteAlarm(id) {
    const itemEl = document.getElementById(`alarm-${id}`);
    if (itemEl) {
        // 🎯 触发退出动画
        itemEl.classList.add('removing');
        // 等待动画结束后再销毁 DOM 与数据
        setTimeout(() => {
            alarms = alarms.filter(a => a.id !== id);
            localStorage.setItem('alpha_alarms', JSON.stringify(alarms));
            renderAlarms();
        }, 280); 
    } else {
        alarms = alarms.filter(a => a.id !== id);
        localStorage.setItem('alpha_alarms', JSON.stringify(alarms));
        renderAlarms();
    }
}

setInterval(() => {
    const now = new Date();
    const currentHM = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const todayStr = `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`;
    
    alarms.forEach(al => {
        if (al.time === currentHM && al.triggeredDay !== todayStr) {
            al.triggeredDay = todayStr;
            localStorage.setItem('alpha_alarms', JSON.stringify(alarms));
            
            const itemEl = document.getElementById(`alarm-${al.id}`);
            if (itemEl) itemEl.classList.add('ringing');
            try { alarmAudio.play(); } catch(e){}
            
            customAlert(`⏰ <b>${al.time}</b> 到了!<br><br>${al.name}`, "日程提醒", "🔔", () => {
                alarmAudio.pause(); alarmAudio.currentTime = 0;
                if (itemEl) itemEl.classList.remove('ringing');
            });
        }
    });
}, 10000);

renderAlarms();

// ================== 智能文本框伸缩 (rAF 防抖优化版) ==================
let ghostTextarea = null;
const pendingAdjustments = new Set();

function flushTextareaAdjustments() {
    // 批量处理所有待调整的 textarea
    for (const el of pendingAdjustments) {
        applyTextareaHeight(el);
    }
    pendingAdjustments.clear();
}

function applyTextareaHeight(el) {
    if (el.dataset.userResized === 'true') return;

    if (!ghostTextarea) {
        ghostTextarea = document.createElement('textarea');
        ghostTextarea.style.cssText = `
            position: absolute !important;
            top: -9999px !important;
            visibility: hidden !important;
            overflow: hidden !important;
            box-sizing: border-box !important;
        `;
        document.body.appendChild(ghostTextarea);
    }

    const computedStyle = window.getComputedStyle(el);
    ghostTextarea.style.width = computedStyle.width;
    ghostTextarea.style.font = computedStyle.font;
    ghostTextarea.style.lineHeight = computedStyle.lineHeight;
    ghostTextarea.style.padding = computedStyle.padding;
    ghostTextarea.style.border = computedStyle.border;
    ghostTextarea.style.wordWrap = 'break-word';

    ghostTextarea.value = el.value;
    ghostTextarea.style.height = '0px';
    let targetHeight = ghostTextarea.scrollHeight;

    if (targetHeight < 200) targetHeight = 200;
    const maxHeight = 380;

    if (el.dataset.lastTargetHeight === String(targetHeight)) return;
    el.dataset.lastTargetHeight = String(targetHeight);

    if (targetHeight >= maxHeight) {
        el.style.height = maxHeight + 'px';
        setTimeout(() => {
            if (parseInt(el.style.height) >= maxHeight) {
                el.style.overflowY = 'auto';
            }
        }, 400);
    } else {
        if (el.style.overflowY === 'auto') {
            el.style.overflowY = 'hidden';
            void el.offsetHeight;
        }
        el.style.height = targetHeight + 'px';
        el.style.overflowY = 'hidden';
    }
}

// 🎯 使用 rAF 防抖: 同一帧内的多次 input 合并为一次布局计算
function scheduleTextareaAdjust(el) {
    pendingAdjustments.add(el);
    if (pendingAdjustments.size === 1) {
        requestAnimationFrame(flushTextareaAdjustments);
    }
}

document.addEventListener('input', (e) => {
    if (e.target.tagName === 'TEXTAREA') {
        scheduleTextareaAdjust(e.target);
    }
});

// 拖拽雷达 (保持不变)
document.addEventListener('mousedown', (e) => {
    if (e.target.tagName === 'TEXTAREA' && window.getComputedStyle(e.target).resize !== 'none') {
        e.target.dataset.startH = e.target.offsetHeight;
    }
});
document.addEventListener('mouseup', (e) => {
    if (e.target.tagName === 'TEXTAREA' && window.getComputedStyle(e.target).resize !== 'none') {
        if (e.target.dataset.startH && e.target.offsetHeight !== parseInt(e.target.dataset.startH)) {
            e.target.dataset.userResized = 'true';
        }
    }
});

// ================== 账户头像 ==================
const DEPRECATED_AVATAR_KEY = 'alpha_user_avatar';
const UNIFIED_ACCOUNT_KEY = 'alpha_account_data';

function syncAvatarToHome() {
    try {
        let avatarBase64 = "";
        
        // 优先读取统一账户中心的数据
        const accountStr = localStorage.getItem(UNIFIED_ACCOUNT_KEY);
        if (accountStr) {
            const accountData = JSON.parse(accountStr);
            if (accountData && accountData.avatar) {
                avatarBase64 = accountData.avatar;
            }
        }
        
        // 兜底读取旧独立键值
        if (!avatarBase64) {
            avatarBase64 = localStorage.getItem(DEPRECATED_AVATAR_KEY) || "";
        }

        const hookWrap = document.querySelector('.alpha-avatar-hook');
        const imgEl = DOM.userAvatarPreview;
        const emojiSpan = hookWrap ? hookWrap.querySelector('.avatar-emoji') : null;

        // 彻底移除外部干涉样式, 不强制赋予 relative, 确保 100% 尊重原网页 CSS 设定
        if (hookWrap) {
            hookWrap.style.position = '';
            hookWrap.style.overflow = '';
        }

        if (avatarBase64 && imgEl) {
            imgEl.src = avatarBase64;
            
            // 💎 终极无损流: 保持原生 display 块级占位, 完美继承原网页对头像框的所有边距与对齐控制
            imgEl.style.display = 'block';
            imgEl.style.position = 'static'; // 确保不脱离文档流
            imgEl.style.width = '100%';
            imgEl.style.height = '100%';
            imgEl.style.objectFit = 'cover';
            imgEl.style.borderRadius = '50%';
            
            // 完美对齐原版设计逻辑: 直接让 Emoji 消失, 腾出完美的正圆坑位给图片, 零位移风险
            if (emojiSpan) emojiSpan.style.display = 'none';
            if (emojiSpan) emojiSpan.style.opacity = '1'; // 重置上版遗留样式
        } else {
            // 无头像状态, 安全回归原貌
            if (imgEl) imgEl.style.display = 'none';
            if (emojiSpan) emojiSpan.style.display = 'block';
        }
    } catch (e) {
        console.error("ALPHA 头像流式位置同步异常:", e);
    }
}

document.addEventListener('wheel', function(e) {
    if (e.target.classList.contains('flatpickr-hour') || e.target.classList.contains('flatpickr-minute')) {
        e.preventDefault();
        
        // 向下滚(deltaY > 0)增加时间(变晚)；向上滚(deltaY < 0)减少时间(变早)
        const step = e.deltaY > 0 ? 1 : -1; 
        
        let max = e.target.classList.contains('flatpickr-hour') ? 23 : 59;
        let val = parseInt(e.target.value, 10);
        if (isNaN(val)) val = 0;
        
        val += step;
        if (val > max) val = 0;
        if (val < 0) val = max;
        
        e.target.value = String(val).padStart(2, '0');
        e.target.dispatchEvent(new Event('input', { bubbles: true })); 
    }
}, { passive: false });

// ================== "负一屏" (TaskNote) 无缝切入引擎 (rAF 节流版) ==================
let isTransitioningToNote = false;
let wheelRafPending = false;
let lastWheelDeltaY = 0;

window.addEventListener('wheel', (e) => {
    lastWheelDeltaY = e.deltaY;
    if (!wheelRafPending && !isTransitioningToNote) {
        wheelRafPending = true;
        requestAnimationFrame(() => {
            wheelRafPending = false;
            if (isTransitioningToNote) return;

            const isAtBottom = Math.ceil(window.innerHeight + window.scrollY) >= document.body.scrollHeight;
            if (isAtBottom && lastWheelDeltaY > 40) {
                isTransitioningToNote = true;

                const pageElements = document.querySelectorAll('body > *:not(script):not(style):not(link):not(.sphere-modal):not(.flatpickr-calendar)');
                pageElements.forEach(el => {
                    el.style.animation = 'none';
                    void el.offsetHeight;
                    el.style.transition = 'transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.6s ease';
                    el.style.transform = 'translateY(-100vh) scale(0.95)';
                    el.style.opacity = '0';
                });

                setTimeout(() => {
                    window.location.href = 'Focus.html';
                }, 500);
            }
        });
    }
}, { passive: true });

// ================= 全局毛玻璃 Tooltip 劫持引擎 (rAF 性能优化版) =================
window.addEventListener('DOMContentLoaded', () => {
    const tooltipNode = document.createElement('div');
    tooltipNode.id = 'alphaTooltip';
    document.body.appendChild(tooltipNode);

    // 🎯 缓存 Tooltip 尺寸, 避免在 rAF 中反复读取 offsetWidth/Height 触发强制重排
    let tooltipWidth = 0;
    let tooltipHeight = 0;
    let pendingX = -9999;
    let pendingY = -9999;
    let rafId = null;
    let tooltipVisible = false;

    // 🎯 仅在内容变更时更新尺寸缓存
    function cacheTooltipSize() {
        tooltipWidth = tooltipNode.offsetWidth;
        tooltipHeight = tooltipNode.offsetHeight;
    }

    // 🎯 纯计算 + 写入, 统一在 rAF 内完成, 一帧只跑一次
    function flushTooltipPosition() {
        rafId = null;
        if (!tooltipVisible) return;

        const offsetX = 14;
        const offsetY = 18;
        let x = pendingX + offsetX;
        let y = pendingY + offsetY;

        // 右侧碰撞检测
        if (x + tooltipWidth > window.innerWidth) {
            x = pendingX - tooltipWidth - 8;
        }
        // 底部碰撞检测
        if (y + tooltipHeight > window.innerHeight) {
            y = pendingY - tooltipHeight - 8;
        }

        tooltipNode.style.left = `${x}px`;
        tooltipNode.style.top = `${y}px`;
    }

    document.addEventListener('mouseover', (e) => {
        const target = e.target.closest('[title], [data-tooltip]');
        if (!target) return;

        if (target.hasAttribute('title')) {
            target.setAttribute('data-tooltip', target.getAttribute('title'));
            target.removeAttribute('title');
        }

        const tipText = target.getAttribute('data-tooltip');
        if (tipText) {
            tooltipNode.textContent = tipText;
            cacheTooltipSize();           // 内容变更时更新尺寸缓存
            pendingX = e.clientX;
            pendingY = e.clientY;
            void tooltipNode.offsetWidth; // 强制浏览器结算文字变动, 确保动画第 0 帧被捕获
            tooltipNode.classList.add('visible');
            tooltipVisible = true;
        }
    });

    document.addEventListener('mousemove', (e) => {
        if (!tooltipVisible) return;
        pendingX = e.clientX;
        pendingY = e.clientY;
        // 🎯 关键优化: 用 rAF 节流, 合并同一帧内的多次 mousemove
        if (!rafId) {
            rafId = requestAnimationFrame(flushTooltipPosition);
        }
    });

    document.addEventListener('mouseout', (e) => {
        const target = e.target.closest('[data-tooltip]');
        if (target) {
            if (!e.relatedTarget || !target.contains(e.relatedTarget)) {
                tooltipNode.classList.remove('visible');
                tooltipVisible = false;
                if (rafId) {
                    cancelAnimationFrame(rafId);
                    rafId = null;
                }
            }
        }
    });

    document.addEventListener('mousedown', () => {
        tooltipNode.classList.remove('visible');
        tooltipVisible = false;
        if (rafId) {
            cancelAnimationFrame(rafId);
            rafId = null;
        }
    });
});
