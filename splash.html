<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>启动 | Tasks</title>
<style>
/* ================== 全局与色彩体系 ================== */
:root {
    --ease-spring: cubic-bezier(0.22, 1, 0.36, 1);
}

html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    /* 彻底透明！从而完美透出底层 mainWindow 的云母/物理毛玻璃材质 */
    background-color: transparent; 
    overflow: hidden;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* ================== 迎风飘扬的 Logo 容器 ================== */
.logo-container {
    position: relative;
    width: 50px; /* Logo 大小 */
    height: 50px;
    animation: flutter 4s ease-in-out infinite;
    /* 退出动画状态时的平滑过渡 */
    transition: opacity 0.6s var(--ease-spring), transform 0.6s var(--ease-spring), filter 0.6s var(--ease-spring);
    will-change: transform, opacity, filter;
}

.logo-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    /* 赋予其柔和的悬浮光影 */
    filter: drop-shadow(0 8px 24px rgba(15, 23, 42, 0.12));
}

/* ================== 模拟阳光拂过 (核心光学引擎) ================== */
.light-sweep {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    /* 暖光渐变：透明 -> 暖金/暖白 -> 透明 */
    background: linear-gradient(
        135deg, 
        transparent 35%, 
        rgba(255, 245, 220, 0.6) 50%, 
        transparent 65%
    );
    background-size: 250% 250%;
    animation: sweep 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    /* 【黑魔法】让光线只在 PNG Logo 的不透明实体上渲染！不会溢出到方框外 */
    mask-image: url('./Tasks_Flat.png');
    mask-size: contain;
    mask-position: center;
    mask-repeat: no-repeat;
    pointer-events: none;
    z-index: 2;
}

/* ================== 关键帧动效 ================== */
/* 迎风飘扬：轻微的呼吸放大与极细微的倾斜 */
@keyframes flutter {
    0% { transform: scale(1) rotate(0deg) translateY(0px); }
    50% { transform: scale(1.03) rotate(0.8deg) translateY(-4px); }
    100% { transform: scale(1) rotate(0deg) translateY(0px); }
}

/* 阳光对角线扫射 */
@keyframes sweep {
    0% { background-position: 150% 150%; }
    100% { background-position: -50% -50%; }
}

/* 退场状态类：向后缩小淡出并模糊 */
.exit-state .logo-container {
    opacity: 0;
    transform: scale(0.8) translateY(-20px);
    filter: blur(12px);
}
</style>
</head>
<body>

    <div class="logo-container">
        <img src="./Tasks_Flat.png" class="logo-img" alt="Tasks Logo" />
        <div class="light-sweep"></div>
    </div>

<script>
    // 监听主界面 wrapper.html 下达的退场指令
    window.addEventListener('message', (event) => {
        if (event.data === 'start-exit') {
            document.body.classList.add('exit-state');
        }
    });
</script>
</body>
</html>
